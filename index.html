<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Passageiro Express luxury</title>
    <script>
      // Prevent "Cannot set property fetch of #<Window> which has only a getter"
      // This happens when a library tries to polyfill fetch but the environment
      // has a getter-only proxy for window.fetch.
      try {
        const originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          get: function() { return originalFetch; },
          set: function(val) { console.warn('Ignored attempt to overwrite window.fetch'); },
          configurable: true
        });
      } catch (e) {
        console.warn('Could not redefine window.fetch', e);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
