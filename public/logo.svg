<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&amp;family=Great+Vibes&amp;display=swap');
      
      .title {
        font-family: 'Montserrat', sans-serif;
        font-weight: 700;
        font-size: 52px;
        letter-spacing: 12px;
        fill: url(#goldGradient);
        filter: url(#shadow);
      }
      
      .subtitle {
        font-family: 'Great Vibes', cursive;
        font-size: 64px;
        fill: url(#goldGradient);
        filter: url(#shadow);
      }
    </style>
    
    <!-- Premium Metallic Gold Gradient matching the reference image -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#BF953F" />
      <stop offset="25%" stop-color="#FCF6BA" />
      <stop offset="50%" stop-color="#B38728" />
      <stop offset="75%" stop-color="#FBF5B7" />
      <stop offset="100%" stop-color="#AA771C" />
    </linearGradient>

    <!-- Subtle Drop Shadow for depth and premium feel -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Transparent Background -->
  <rect width="1000" height="500" fill="transparent" />

  <!-- Stylized Golden Wings Emblem -->
  <g id="wings" transform="translate(500, 40)" filter="url(#shadow)">
    <!-- Left Wing -->
    <g id="left-wing">
      <path d="M -360,20 C -310,80 -230,160 -80,220 C -60,228 -40,230 -40,230 C -130,180 -210,90 -270,10 C -300,-25 -360,20 -360,20 Z" fill="url(#goldGradient)"/>
      <path d="M -270,70 C -230,120 -160,180 -50,230 C -35,238 -20,240 -20,240 C -100,190 -160,120 -210,50 C -230,20 -270,70 -270,70 Z" fill="url(#goldGradient)"/>
      <path d="M -200,120 C -170,160 -110,210 -30,245 C -20,250 -10,252 -10,252 C -70,205 -120,145 -160,90 C -175,65 -200,120 -200,120 Z" fill="url(#goldGradient)"/>
      <path d="M -140,165 C -115,195 -70,230 -15,255 C -7,259 0,260 0,260 C -50,225 -90,175 -115,135 C -125,120 -140,165 -140,165 Z" fill="url(#goldGradient)"/>
    </g>
    <!-- Right Wing (Mirrored perfectly) -->
    <g id="right-wing" transform="scale(-1, 1)">
      <path d="M -360,20 C -310,80 -230,160 -80,220 C -60,228 -40,230 -40,230 C -130,180 -210,90 -270,10 C -300,-25 -360,20 -360,20 Z" fill="url(#goldGradient)"/>
      <path d="M -270,70 C -230,120 -160,180 -50,230 C -35,238 -20,240 -20,240 C -100,190 -160,120 -210,50 C -230,20 -270,70 -270,70 Z" fill="url(#goldGradient)"/>
      <path d="M -200,120 C -170,160 -110,210 -30,245 C -20,250 -10,252 -10,252 C -70,205 -120,145 -160,90 C -175,65 -200,120 -200,120 Z" fill="url(#goldGradient)"/>
      <path d="M -140,165 C -115,195 -70,230 -15,255 C -7,259 0,260 0,260 C -50,225 -90,175 -115,135 C -125,120 -140,165 -140,165 Z" fill="url(#goldGradient)"/>
    </g>
  </g>

  <!-- Text: PASSAGEIRO EXPRESS -->
  <text x="508" y="390" class="title" text-anchor="middle">PASSAGEIRO EXPRESS</text>
  
  <!-- Text: Luxury with side lines -->
  <g transform="translate(500, 460)">
    <line x1="-180" y1="-18" x2="-90" y2="-18" stroke="url(#goldGradient)" stroke-width="2" filter="url(#shadow)"/>
    <text x="0" y="0" class="subtitle" text-anchor="middle">Luxury</text>
    <line x1="90" y1="-18" x2="180" y2="-18" stroke="url(#goldGradient)" stroke-width="2" filter="url(#shadow)"/>
  </g>
</svg>
